name: Execute microCI pipeline

on: [push]

jobs:
  execute-docker:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run microCI
        run: |
          curl -fsSL github.com/geraldolsribeiro/microci/releases/download/latest/microCI -o microCI
          chmod 755 ./microCI
          mkdir -p ~/.ssh/
          touch ~/.ssh/config
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -q
          ./microCI | bash

      - name: Save Multiple Outputs
        uses: actions/upload-artifact@v5
        with:
          name: multi-artifact
          path: |
            _book/Gentle_Introduction_to_Embedded_Software_with_microCI.pdf

      - name: 'Pre-Release'
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Latest"
          files: |
            _book/Gentle_Introduction_to_Embedded_Software_with_microCI.pdf
            LICENSE
