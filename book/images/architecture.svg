<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <style>
      .box { fill: #1f77b4; stroke: #0b2e4a; stroke-width: 2; rx: 12; ry: 12; }
      .sub { fill: #2ca02c; stroke: #1d5f1d; stroke-width: 2; rx: 12; ry: 12; }
      .txt { fill: white; font-family: sans-serif; font-size: 24px; font-weight: 600; }
      .label { fill: #222; font-family: sans-serif; font-size: 20px; }
      .arrow { stroke: #444; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#444" />
    </marker>
  </defs>

  <rect class="box" x="60" y="190" width="220" height="120"/>
  <text class="txt" x="170" y="245" text-anchor="middle">Application</text>
  <text class="txt" x="170" y="275" text-anchor="middle">Logic</text>

  <rect class="sub" x="350" y="120" width="220" height="90"/>
  <text class="txt" x="460" y="175" text-anchor="middle">Drivers</text>

  <rect class="sub" x="350" y="245" width="220" height="90"/>
  <text class="txt" x="460" y="300" text-anchor="middle">HAL / BSP</text>

  <rect class="box" x="650" y="190" width="220" height="120"/>
  <text class="txt" x="760" y="245" text-anchor="middle">Hardware</text>
  <text class="txt" x="760" y="275" text-anchor="middle">Peripherals</text>

  <line class="arrow" x1="280" y1="250" x2="350" y2="165"/>
  <line class="arrow" x1="280" y1="250" x2="350" y2="290"/>
  <line class="arrow" x1="570" y1="165" x2="650" y2="250"/>
  <line class="arrow" x1="570" y1="290" x2="650" y2="250"/>

  <text class="label" x="170" y="360" text-anchor="middle">High-level firmware layering</text>
</svg>
